<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma collection de vinyles</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; padding: 1.5rem 1rem; }
  .container { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; display: inline-block; }
  .sync-dot.ok { background: #1D9E75; }
  .sync-dot.err { background: #E24B4A; }
  .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .toolbar input[type=text], .toolbar select {
    padding: 7px 12px; border: 0.5px solid #ccc; border-radius: 8px;
    font-size: 14px; background: #fff; color: #1a1a18; outline: none;
  }
  .toolbar input[type=text] { flex: 1; min-width: 140px; }
  .toolbar input:focus, .toolbar select:focus { border-color: #888; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: #eeecea; border-radius: 8px; padding: 0.75rem 1rem; }
  .stat-label { font-size: 12px; color: #666; margin-bottom: 4px; }
  .stat-val { font-size: 20px; font-weight: 500; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
  .card { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; overflow: hidden; position: relative; transition: border-color 0.15s; }
  .card:hover { border-color: #aaa; }
  .cover-wrap { position: relative; }
  .cover { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
  .cover-placeholder { width: 100%; aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f0efeb; gap: 6px; cursor: pointer; }
  .cover-placeholder svg { width: 28px; height: 28px; stroke: #aaa; fill: none; stroke-width: 1.5; }
  .cover-placeholder span { font-size: 11px; color: #aaa; }
  .cover-edit { position: absolute; bottom: 6px; right: 6px; background: #fff; border: 0.5px solid #ccc; border-radius: 6px; padding: 3px 8px; font-size: 11px; cursor: pointer; color: #555; opacity: 0; transition: opacity 0.15s; }
  .card:hover .cover-edit { opacity: 1; }
  .card-body { padding: 0.7rem 0.9rem; }
  .genre-pill { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-bottom: 6px; font-weight: 500; }
  .genre-rap      { background: #EEEDFE; color: #3C3489; }
  .genre-newwave  { background: #FBEAF0; color: #72243E; }
  .genre-pop      { background: #FAEEDA; color: #633806; }
  .genre-variete  { background: #E1F5EE; color: #085041; }
  .genre-rock     { background: #FCEBEB; color: #791F1F; }
  .genre-jazz     { background: #E6F1FB; color: #0C447C; }
  .genre-soul     { background: #FAECE7; color: #712B13; }
  .card-artist { font-size: 14px; font-weight: 500; margin-bottom: 1px; }
  .card-title  { font-size: 12px; color: #555; font-style: italic; margin-bottom: 3px; }
  .card-year   { font-size: 11px; color: #999; }
  .card-note   { font-size: 11px; color: #666; margin-top: 6px; padding-top: 6px; border-top: 0.5px solid #eee; }
  .rating-row  { display: flex; gap: 1px; margin-top: 5px; }
  .star        { color: #EF9F27; font-size: 15px; cursor: pointer; }
  .empty-star  { color: #ddd; font-size: 15px; cursor: pointer; }
  .del-btn { position: absolute; top: 6px; right: 6px; background: #fff; border: 0.5px solid #ddd; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; color: #999; font-size: 14px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s; z-index: 2; }
  .card:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: #c0392b; border-color: #c0392b; }
  .add-panel { background: #eeecea; border-radius: 12px; padding: 1rem 1.25rem; margin-top: 1.5rem; }
  .add-panel h3 { font-size: 15px; font-weight: 500; margin-bottom: 12px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .form-grid input, .form-grid select, .form-grid textarea {
    width: 100%; padding: 7px 10px; border: 0.5px solid #ccc; border-radius: 8px;
    font-size: 14px; background: #fff; color: #1a1a18; font-family: inherit; outline: none;
  }
  .form-grid input:focus, .form-grid select:focus, .form-grid textarea:focus { border-color: #888; }
  .form-grid textarea { grid-column: 1/-1; height: 52px; resize: none; }
  .photo-upload-area { grid-column: 1/-1; border: 0.5px dashed #bbb; border-radius: 8px; padding: 0.75rem 1rem; display: flex; align-items: center; gap: 12px; cursor: pointer; background: #fff; }
  .photo-upload-area:hover { border-color: #888; }
  .photo-preview-sm { width: 52px; height: 52px; object-fit: cover; border-radius: 6px; border: 0.5px solid #ddd; display: none; flex-shrink: 0; }
  .photo-upload-text { font-size: 13px; color: #666; }
  .photo-upload-text strong { display: block; font-weight: 500; color: #1a1a18; margin-bottom: 1px; }
  .form-actions { display: flex; justify-content: flex-end; margin-top: 10px; }
  .btn { padding: 7px 18px; border-radius: 8px; font-size: 14px; cursor: pointer; border: 0.5px solid #bbb; background: #fff; color: #1a1a18; font-family: inherit; }
  .btn:hover { background: #f0efeb; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .no-results { text-align: center; color: #999; padding: 2rem 0; font-size: 14px; }
  .loading-overlay { text-align: center; color: #999; padding: 3rem 0; font-size: 14px; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #1a1a18; color: #fff; padding: 8px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
  input[type=file] { display: none; }
  @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } .form-grid textarea, .photo-upload-area { grid-column: 1; } }
</style>
</head>
<body>
<div class="container">
  <h1>🎵 Collection de vinyles <span class="sync-dot" id="sync-dot" title="Connexion"></span></h1>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Rechercher…" oninput="render()">
    <select id="filter-genre" onchange="render()">
      <option value="">Tous les genres</option>
      <option value="rap">Rap</option>
      <option value="newwave">New wave</option>
      <option value="pop">Pop</option>
      <option value="variete">Variété</option>
      <option value="rock">Rock</option>
      <option value="jazz">Jazz</option>
      <option value="soul">Soul</option>
    </select>
    <select id="sort" onchange="render()">
      <option value="artist">Artiste A→Z</option>
      <option value="year">Année ↑</option>
      <option value="year-desc">Année ↓</option>
      <option value="rating">Note ↓</option>
    </select>
    <button class="btn" onclick="loadRecords()" title="Rafraîchir">↺</button>
  </div>

  <div class="stats" id="stats"></div>
  <div id="grid-wrap"><div class="loading-overlay">Chargement de la collection…</div></div>

  <div class="add-panel">
    <h3>+ Ajouter un vinyle</h3>
    <div class="form-grid">
      <input type="text" id="f-artist" placeholder="Artiste">
      <input type="text" id="f-title" placeholder="Titre de l'album">
      <input type="number" id="f-year" placeholder="Année" min="1900" max="2030">
      <select id="f-genre">
        <option value="rap">Rap</option>
        <option value="newwave">New wave</option>
        <option value="pop">Pop</option>
        <option value="variete">Variété</option>
        <option value="rock">Rock</option>
        <option value="jazz">Jazz</option>
        <option value="soul">Soul</option>
      </select>
      <div class="photo-upload-area" onclick="document.getElementById('f-photo').click()">
        <img id="photo-preview-sm" class="photo-preview-sm" alt="Aperçu">
        <div class="photo-upload-text">
          <strong>📷 Ajouter une photo de pochette</strong>
          Prendre une photo ou choisir dans la galerie
        </div>
      </div>
      <input type="file" id="f-photo" accept="image/*" capture="environment" onchange="previewPhoto()">
      <textarea id="f-note" placeholder="Notes personnelles…"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn" id="btn-add" onclick="addRecord()">+ Ajouter</button>
    </div>
  </div>
</div>

<input type="file" id="edit-photo-input" accept="image/*" capture="environment">
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://dougzjutanuklxvlkwxj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvdWd6anV0YW51a2x4dmxrd3hqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NjA4MTYsImV4cCI6MjA5NTAzNjgxNn0.WVf6dZluk0WKX9Yf0EX1AIaWo89dn0mZ_5XAFJoqEf8';
const HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

const genreLabel = { rap:'Rap', newwave:'New wave', pop:'Pop', variete:'Variété', rock:'Rock', jazz:'Jazz', soul:'Soul' };

let records = [];
let pendingCover = null;
let editingCoverId = null;

function api(path, opts) {
  return fetch(SUPABASE_URL + '/rest/v1/' + path, { headers: HEADERS, ...opts });
}

function toast(msg, duration=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function setSync(ok) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot ' + (ok ? 'ok' : 'err');
  dot.title = ok ? 'Connecté à Supabase' : 'Erreur de connexion';
}

async function loadRecords() {
  try {
    const res = await api('vinyles?order=created_at.asc&select=*');
    if (!res.ok) throw new Error();
    records = await res.json();
    setSync(true);
    render();
  } catch(e) {
    setSync(false);
    document.getElementById('grid-wrap').innerHTML = '<div class="loading-overlay">Impossible de charger la collection. Vérifiez votre connexion.</div>';
  }
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => res(e.target.result);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

function resizeImage(base64, maxSize=800) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      res(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.src = base64;
  });
}

function previewPhoto() {
  const file = document.getElementById('f-photo').files[0];
  if (!file) return;
  fileToBase64(file).then(b64 => resizeImage(b64)).then(b64 => {
    pendingCover = b64;
    const img = document.getElementById('photo-preview-sm');
    img.src = b64;
    img.style.display = 'block';
  });
}

function stars(rating, id) {
  return Array.from({length:5}, (_,i) =>
    `<span class="${i < rating ? 'star' : 'empty-star'}" onclick="setRating(${id}, ${i+1})">★</span>`
  ).join('');
}

function render() {
  const q   = document.getElementById('search').value.toLowerCase();
  const fg  = document.getElementById('filter-genre').value;
  const srt = document.getElementById('sort').value;

  let data = records.filter(r =>
    (!q  || r.artist.toLowerCase().includes(q) || r.title.toLowerCase().includes(q)) &&
    (!fg || r.genre === fg)
  );
  if (srt === 'artist')     data.sort((a,b) => a.artist.localeCompare(b.artist));
  else if (srt === 'year')      data.sort((a,b) => (a.year||0)-(b.year||0));
  else if (srt === 'year-desc') data.sort((a,b) => (b.year||0)-(a.year||0));
  else if (srt === 'rating')    data.sort((a,b) => b.rating-a.rating);

  const wrap = document.getElementById('grid-wrap');
  if (!data.length) {
    wrap.innerHTML = '<div class="no-results">Aucun vinyle trouvé.</div>';
  } else {
    wrap.innerHTML = `<div class="grid">${data.map(r => `
      <div class="card">
        <button class="del-btn" onclick="delRecord('${r.id}')" title="Supprimer">✕</button>
        <div class="cover-wrap">
          ${r.cover
            ? `<img class="cover" src="${r.cover}" alt="Pochette de ${r.artist}">`
            : `<div class="cover-placeholder" onclick="triggerCoverEdit('${r.id}')">
                 <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                 <span>Ajouter une photo</span>
               </div>`
          }
          ${r.cover ? `<button class="cover-edit" onclick="triggerCoverEdit('${r.id}')">📷 Changer</button>` : ''}
        </div>
        <div class="card-body">
          <span class="genre-pill genre-${r.genre}">${genreLabel[r.genre]||r.genre}</span>
          <div class="card-artist">${r.artist}</div>
          <div class="card-title">${r.title}</div>
          <div class="card-year">${r.year||'—'}</div>
          <div class="rating-row">${stars(r.rating||0, r.id)}</div>
          ${r.note ? `<div class="card-note">${r.note}</div>` : ''}
        </div>
      </div>`).join('')}</div>`;
  }

  const genres = {};
  records.forEach(r => genres[r.genre] = (genres[r.genre]||0)+1);
  const top = Object.entries(genres).sort((a,b)=>b[1]-a[1])[0];
  const rated = records.filter(r=>r.rating>0);
  const decades = [...new Set(records.filter(r=>r.year).map(r=>Math.floor(r.year/10)*10))].sort().map(d=>d+'s').join(', ');
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Total vinyles</div><div class="stat-val">${records.length}</div></div>
    <div class="stat"><div class="stat-label">Genre principal</div><div class="stat-val" style="font-size:15px">${top ? genreLabel[top[0]]||top[0] : '—'}</div></div>
    <div class="stat"><div class="stat-label">Note moyenne</div><div class="stat-val">${rated.length ? (rated.reduce((s,r)=>s+r.rating,0)/rated.length).toFixed(1)+' ★' : '—'}</div></div>
    <div class="stat"><div class="stat-label">Décennies</div><div class="stat-val" style="font-size:13px">${decades||'—'}</div></div>`;
}

async function setRating(id, val) {
  const r = records.find(x=>x.id===id);
  if (!r) return;
  const newRating = r.rating === val ? 0 : val;
  r.rating = newRating;
  render();
  try {
    await api(`vinyles?id=eq.${id}`, { method:'PATCH', body: JSON.stringify({ rating: newRating }) });
  } catch(e) { toast('Erreur lors de la mise à jour de la note'); }
}

async function delRecord(id) {
  if (!confirm('Supprimer ce vinyle ?')) return;
  records = records.filter(r=>r.id!==id);
  render();
  try {
    await api(`vinyles?id=eq.${id}`, { method:'DELETE' });
    toast('Vinyle supprimé');
  } catch(e) { toast('Erreur lors de la suppression'); loadRecords(); }
}

function triggerCoverEdit(id) {
  editingCoverId = id;
  const inp = document.getElementById('edit-photo-input');
  inp.value = '';
  inp.click();
}

document.getElementById('edit-photo-input').addEventListener('change', async function() {
  const file = this.files[0];
  if (!file || !editingCoverId) return;
  const b64raw = await fileToBase64(file);
  const b64 = await resizeImage(b64raw);
  const r = records.find(x=>x.id===editingCoverId);
  if (r) { r.cover = b64; render(); }
  try {
    await api(`vinyles?id=eq.${editingCoverId}`, { method:'PATCH', body: JSON.stringify({ cover: b64 }) });
    toast('Photo mise à jour ✓');
  } catch(e) { toast('Erreur lors de l\'envoi de la photo'); }
  editingCoverId = null;
});

async function addRecord() {
  const artist = document.getElementById('f-artist').value.trim();
  const title  = document.getElementById('f-title').value.trim();
  if (!artist || !title) { toast('Artiste et titre requis'); return; }
  const btn = document.getElementById('btn-add');
  btn.disabled = true;
  btn.textContent = 'Enregistrement…';
  const payload = {
    artist, title,
    year:   parseInt(document.getElementById('f-year').value) || null,
    genre:  document.getElementById('f-genre').value,
    rating: 0,
    note:   document.getElementById('f-note').value.trim(),
    cover:  pendingCover || null
  };
  try {
    const res = await api('vinyles', { method:'POST', body: JSON.stringify(payload) });
    if (!res.ok) throw new Error();
    const [created] = await res.json();
    records.push(created);
    ['f-artist','f-title','f-year','f-note'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-photo').value='';
    document.getElementById('photo-preview-sm').style.display='none';
    pendingCover = null;
    render();
    toast('Vinyle ajouté ✓');
  } catch(e) {
    toast('Erreur lors de l\'ajout');
  }
  btn.disabled = false;
  btn.textContent = '+ Ajouter';
}

loadRecords();
</script>
</body>
</html>
